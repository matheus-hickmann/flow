<select
  [id]="id()"
  [value]="value()"
  (change)="onChange($event)"
  class="w-full rounded-lg border border-neutral-300 p-3 text-sm text-neutral-800 focus:border-primary focus:ring-1 focus:ring-primary appearance-none bg-no-repeat select-dropdown-icon"
  [attr.aria-label]="ariaLabel()">
  <ng-content />
</select>
