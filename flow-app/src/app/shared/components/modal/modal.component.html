<div class="fixed inset-0 z-50 flex items-center justify-center p-4"
     role="dialog"
     aria-modal="true"
     (click)="onOverlayClick($event)">
  <div class="absolute inset-0 modal-overlay" style="background: rgba(0,0,0,.5)" aria-hidden="true"></div>
  <div class="relative rounded-2xl overflow-hidden max-h-[90vh] w-full max-w-lg flex flex-col"
       style="background: var(--flow-paper); border: 1px solid var(--flow-line); box-shadow: var(--flow-shadow-card)"
       (click)="$event.stopPropagation()">
    <div class="flex items-center justify-between px-6 py-4 border-b border-flow shrink-0">
      <div>
        @if (eyebrow()) {
          <span class="label-eyebrow">{{ eyebrow() }}</span>
          <h2 class="font-serif text-2xl mt-0.5">{{ title() }}</h2>
        } @else {
          <h2 class="font-serif text-2xl">{{ title() }}</h2>
        }
      </div>
      <button type="button"
              (click)="close()"
              class="h-8 w-8 grid place-items-center rounded-lg border border-flow hover:bg-flow-bg transition-colors"
              style="color: var(--flow-ink-soft)"
              aria-label="Fechar">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="px-6 py-5 overflow-y-auto flex-1">
      <ng-content />
    </div>
  </div>
</div>
