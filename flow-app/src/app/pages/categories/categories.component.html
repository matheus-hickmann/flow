<div class="font-sans space-y-6">

  <!-- ─── Sub-header ─────────────────────────────────────────────── -->
  <div class="flex items-center justify-between pb-4 border-b border-flow">
    <div class="flex items-center gap-4">
      <span class="label-eyebrow">CONFIGURAÇÃO</span>
      <h1 class="font-serif text-3xl m-0">Categorias</h1>
    </div>
    <button type="button" (click)="save()" [disabled]="saving()"
            class="h-8 inline-flex items-center gap-1.5 px-3 rounded-lg text-xs font-medium hover:opacity-90 disabled:opacity-50 transition-opacity"
            style="background: var(--flow-ink); color: var(--flow-bg)">
      {{ saving() ? 'Salvando…' : 'Salvar' }}
    </button>
  </div>

  @if (success()) {
    <div class="bg-flow-mint border border-flow rounded-xl px-4 py-3">
      <p class="font-mono-num text-[11px] text-flow-mint-ink">Categorias salvas com sucesso.</p>
    </div>
  }
  @if (error()) {
    <p class="font-mono-num text-[11px] text-flow-neg">{{ error() }}</p>
  }

  <!-- Tabs -->
  <div class="inline-flex border border-flow rounded-lg p-0.5 bg-flow-paper">
    <button type="button" (click)="setTab('expense')"
            class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors"
            [class.bg-flow-ink]="activeTab() === 'expense'"
            [class.text-flow-bg]="activeTab() === 'expense'"
            [class.text-flow-ink-soft]="activeTab() !== 'expense'">
      Despesas
    </button>
    <button type="button" (click)="setTab('income')"
            class="px-4 py-1.5 rounded-md text-xs font-medium transition-colors"
            [class.bg-flow-ink]="activeTab() === 'income'"
            [class.text-flow-bg]="activeTab() === 'income'"
            [class.text-flow-ink-soft]="activeTab() !== 'income'">
      Receitas
    </button>
  </div>

  @if (loading()) {
    <div class="bg-flow-paper border border-flow rounded-2xl p-10 text-center">
      <span class="label-eyebrow">Carregando…</span>
    </div>
  } @else {
    <!-- Category list -->
    <div class="flex flex-col gap-2">
      @for (cat of currentList; track cat.id) {
        <div class="flex items-center gap-3 bg-flow-paper border border-flow rounded-xl px-4 py-3">
          <input type="color" [value]="cat.color" (input)="updateColor(cat.id, $event)"
                 class="h-8 w-8 cursor-pointer rounded border border-flow shrink-0">
          <span class="flex-1 text-[13px] font-medium" style="color: var(--flow-ink)">{{ cat.name }}</span>
          <button type="button" (click)="removeCategory(cat.id)"
                  class="p-1.5 rounded-lg text-flow-ink-soft hover:bg-flow-rose hover:text-flow-neg transition-colors"
                  title="Remover">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      } @empty {
        <p class="font-mono-num text-[11px] text-flow-ink-mute">Nenhuma categoria. Adicione abaixo.</p>
      }
    </div>

    <!-- Adicionar nova categoria -->
    <div class="bg-flow-paper border border-flow rounded-2xl p-4 flex gap-3 items-end">
      <div class="shrink-0">
        <label class="label-eyebrow block mb-1">Cor</label>
        <input type="color" [value]="newColor()" (input)="setNewColor($event)"
               class="h-9 w-12 cursor-pointer rounded border border-flow">
      </div>
      <div class="flex-1">
        <label class="label-eyebrow block mb-1">Nome da categoria</label>
        <input type="text" [value]="newName()" (input)="setNewName($event)"
               placeholder="Ex.: Streaming"
               class="w-full h-9 px-3 rounded-xl border border-flow text-sm focus:outline-none"
               style="background: var(--flow-bg); color: var(--flow-ink)">
      </div>
      <button type="button" (click)="addCategory()" [disabled]="!newName().trim()"
              class="h-9 px-4 rounded-xl text-sm font-medium hover:opacity-90 disabled:opacity-50 shrink-0 transition-opacity"
              style="background: var(--flow-ink); color: var(--flow-bg)">
        Adicionar
      </button>
    </div>
  }
</div>
