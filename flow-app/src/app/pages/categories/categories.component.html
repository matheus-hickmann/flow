<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-neutral-800 dark:text-neutral-100">Categorias</h1>
    <button type="button" (click)="save()" [disabled]="saving()"
            class="rounded-lg bg-primary px-4 py-2 text-white hover:opacity-90 disabled:opacity-50 transition-opacity">
      {{ saving() ? 'Salvando…' : 'Salvar' }}
    </button>
  </div>

  @if (success()) {
    <div class="rounded-lg bg-green-50 dark:bg-green-950 border border-green-200 dark:border-green-800 px-4 py-3 text-sm text-green-700 dark:text-green-300">
      Categorias salvas com sucesso.
    </div>
  }
  @if (error()) {
    <p class="text-sm text-danger">{{ error() }}</p>
  }

  <!-- Tabs -->
  <div class="flex gap-1 rounded-lg bg-neutral-100 dark:bg-neutral-800 p-1 w-fit">
    <button type="button"
            (click)="setTab('expense')"
            [class.bg-white]="activeTab() === 'expense'"
            [class.dark:bg-neutral-900]="activeTab() === 'expense'"
            [class.shadow-sm]="activeTab() === 'expense'"
            class="px-4 py-1.5 rounded-md text-sm font-medium transition-all text-neutral-600 dark:text-neutral-300">
      Despesas
    </button>
    <button type="button"
            (click)="setTab('income')"
            [class.bg-white]="activeTab() === 'income'"
            [class.dark:bg-neutral-900]="activeTab() === 'income'"
            [class.shadow-sm]="activeTab() === 'income'"
            class="px-4 py-1.5 rounded-md text-sm font-medium transition-all text-neutral-600 dark:text-neutral-300">
      Receitas
    </button>
  </div>

  @if (loading()) {
    <p class="text-neutral-500 dark:text-neutral-400">Carregando categorias...</p>
  } @else {
    <!-- Category list -->
    <div class="space-y-2">
      @for (cat of currentList; track cat.id) {
        <div class="flex items-center gap-3 rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-900 px-4 py-3">
          <input type="color" [value]="cat.color" (input)="updateColor(cat.id, $event)"
                 class="h-8 w-8 cursor-pointer rounded border border-neutral-300 dark:border-neutral-600 shrink-0">
          <span class="flex-1 text-sm font-medium text-neutral-800 dark:text-neutral-200">{{ cat.name }}</span>
          <button type="button" (click)="removeCategory(cat.id)"
                  class="p-1.5 rounded-lg text-neutral-400 hover:text-danger hover:bg-red-50 dark:hover:bg-red-950 transition-colors"
                  title="Remover">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      } @empty {
        <p class="text-sm text-neutral-500 dark:text-neutral-400">Nenhuma categoria. Adicione abaixo.</p>
      }
    </div>

    <!-- Add new -->
    <div class="flex gap-3 items-end rounded-xl border border-dashed border-neutral-300 dark:border-neutral-600 p-4">
      <div class="shrink-0">
        <label class="block text-xs font-medium text-neutral-600 dark:text-neutral-400 mb-1">Cor</label>
        <input type="color" [value]="newColor()" (input)="setNewColor($event)"
               class="h-9 w-12 cursor-pointer rounded border border-neutral-300 dark:border-neutral-600">
      </div>
      <div class="flex-1">
        <label class="block text-xs font-medium text-neutral-600 dark:text-neutral-400 mb-1">Nome da categoria</label>
        <input type="text" [value]="newName()" (input)="setNewName($event)"
               placeholder="Ex.: Streaming"
               class="w-full rounded-lg border border-neutral-300 dark:border-neutral-600 bg-white dark:bg-neutral-800 px-3 py-2 text-sm text-neutral-800 dark:text-neutral-100 focus:border-primary focus:ring-1 focus:ring-primary">
      </div>
      <button type="button" (click)="addCategory()" [disabled]="!newName().trim()"
              class="rounded-lg bg-primary px-4 py-2 text-sm text-white hover:opacity-90 disabled:opacity-50 shrink-0">
        Adicionar
      </button>
    </div>
  }
</div>
